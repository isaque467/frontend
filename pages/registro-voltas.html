<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro Voltas - F1 System</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <header class="header">
    <nav class="nav">
      <div class="logo">🏎️ F1 SYSTEM</div>
      <ul class="nav-links">
        <li><a href="dashboard.html">📊 Dashboard</a></li>
        <li><a href="cadastro-usuarios.html">👤 Usuários</a></li>
        <li><a href="cadastro-corredores.html">🏁 Corredores</a></li>
        <li><a href="registro-voltas.html">⏱️ Voltas</a></li>
        <li><a href="ranking.html">🏆 Ranking</a></li>
        <li><a href="podio.html">🥇 Pódio</a></li>
        <li><a href="#" onclick="logout()">🚪 Sair</a></li>
      </ul>
    </nav>
  </header>

  <div class="container">
    <h1 class="page-title">⏱️ Registro de Voltas</h1>
    <div class="glass-card">
      <form class="form-section">
        <div class="form-group">
          <label class="label">Corredor</label>
          <select class="input">
            <option>#7 - Isaque Silva</option>
            <option>#12 - João Santos</option>
          </select>
        </div>
        <div class="form-group">
          <label class="label">Tempo Volta</label>
          <input type="text" class="input" placeholder="MM:SS.mmm ex: 01:28.456">
        </div>
        <div class="form-group">
          <label class="label">Volta #</label>
          <input type="number" class="input" placeholder="1">
        </div>
        <button type="submit" class="btn">Registrar Volta 🏁</button>
      </form>

      <div class="table-wrapper mt-2">
        <table class="table">
          <thead>
            <tr>
              <th>Corredor</th>
              <th>Volta</th>
              <th>Tempo</th>
              <th>Data</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>#7 Isaque</td>
              <td>1</td>
              <td>1:28.456</td>
              <td>2024-01-15</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>function logout(){localStorage.removeItem('f1_user');window.location.href='login.html'}</script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro Voltas - F1 System</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
/*** F1 SYSTEM - FULL CSS ***/

:root {
  --f1-black: #050508;
  --f1-dark: #0a0a14;
  --f1-red: #ff1744;
  --f1-orange: #ff9100;
  --f1-gold: #ffd700;
  --f1-silver: #c0c0c0;
  --f1-bronze: #cd7f32;
  --f1-green: #4ade80;
  --glass-bg: rgba(255,255,255,0.03);
  --glass-border: rgba(255,255,255,0.08);
  --glass-blur: blur(20px);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
::selection { background: rgba(255,23,68,0.35); color: #fff; text-shadow: 0 0 10px rgba(255,23,68,0.5); }
::-moz-selection { background: rgba(255,23,68,0.35); color: #fff; }

body {
  font-family: 'Rajdhani','Orbitron',sans-serif;
  background: #050508;
  color: #e0e0e0;
  min-height: 100vh;
  overflow-x: hidden;
  line-height: 1.6;
  position: relative;
  cursor: crosshair;
}

a, button, .btn, .input, select, .hamburger, [onclick] { cursor: pointer; }
*:focus-visible { outline: 2px solid rgba(255,145,0,0.6); outline-offset: 3px; border-radius: 4px; box-shadow: 0 0 15px rgba(255,145,0,0.25); }
.input:focus-visible, .btn:focus-visible { outline: none; }

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,23,68,0.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,23,68,0.03) 1px,transparent 1px),
    linear-gradient(rgba(255,145,0,0.015) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,145,0,0.015) 1px,transparent 1px);
  background-size: 100px 100px,100px 100px,20px 20px,20px 20px;
  z-index: -2;
  animation: circuitMove 20s linear infinite;
}
@keyframes circuitMove { 0% { background-position: 0 0,0 0,0 0,0 0; } 100% { background-position: 100px 100px,100px 100px,20px 20px,20px 20px; } }

body::after {
  content: '';
  position: fixed;
  inset: 0;
  z-index: -3;
  pointer-events: none;
  background:
    repeating-linear-gradient(60deg,transparent,transparent 100px,rgba(255,23,68,0.008) 100px,rgba(255,23,68,0.008) 101px),
    repeating-linear-gradient(-60deg,transparent,transparent 150px,rgba(255,145,0,0.006) 150px,rgba(255,145,0,0.006) 151px);
  background-size: 200px 200px,300px 300px;
  animation: ledBarsPulse 6s ease-in-out infinite;
}
@keyframes ledBarsPulse { 0%,100% { opacity: 0.55; } 50% { opacity: 1; } }

body > .container::before {
  content: '';
  position: fixed;
  inset: 0;
  z-index: -1;
  pointer-events: none;
  background: radial-gradient(ellipse at center,transparent 0%,transparent 55%,rgba(0,0,0,0.35) 100%);
}

html::before {
  content: '';
  position: fixed;
  inset: 0;
  z-index: -3;
  pointer-events: none;
  background:
    linear-gradient(180deg,transparent 0%,rgba(255,23,68,0.22) 15%,rgba(255,145,0,0.3) 45%,rgba(255,23,68,0.22) 75%,transparent 100%),
    linear-gradient(180deg,transparent 10%,rgba(255,145,0,0.18) 30%,rgba(255,215,0,0.25) 55%,rgba(255,145,0,0.18) 80%,transparent 100%);
  background-size: 5px 100%,4px 100%;
  background-position: 6% 0,92% 0;
  background-repeat: no-repeat;
  filter: blur(1px);
  animation: ledBarsPulse 4s ease-in-out infinite;
}
html::after {
  content: '';
  position: fixed;
  inset: 0;
  z-index: -3;
  pointer-events: none;
  background:
    linear-gradient(90deg,transparent 0%,rgba(255,23,68,0.14) 20%,rgba(255,145,0,0.2) 50%,rgba(255,23,68,0.14) 80%,transparent 100%),
    linear-gradient(90deg,transparent 10%,rgba(255,145,0,0.1) 35%,rgba(255,215,0,0.16) 60%,rgba(255,145,0,0.1) 85%,transparent 100%);
  background-size: 100% 3px,100% 3px;
  background-position: 0 28%,0 72%;
  background-repeat: no-repeat;
  filter: blur(1px);
  animation: ledBarsPulse 5s ease-in-out infinite reverse;
}

.container { max-width: 1400px; margin: 0 auto; padding: 20px; position: relative; z-index: 1; }

.header {
  background: linear-gradient(180deg,rgba(12,12,24,0.94) 0%,rgba(6,6,18,0.96) 100%);
  backdrop-filter: blur(35px) saturate(1.35);
  -webkit-backdrop-filter: blur(35px) saturate(1.35);
  border-bottom: 1px solid rgba(255,23,68,0.3);
  box-shadow: 0 0 45px rgba(255,23,68,0.18),0 5px 30px rgba(0,0,0,0.65),inset 0 1px 0 rgba(255,255,255,0.06);
  position: sticky;
  top: 0;
  z-index: 1000;
}
.header::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 4px;
  background: linear-gradient(90deg,transparent 0%,#ff1744 15%,#ff9100 35%,#ffd700 50%,#ff9100 65%,#ff1744 85%,transparent 100%);
  box-shadow: 0 0 15px rgba(255,23,68,0.55),0 0 35px rgba(255,145,0,0.35);
  animation: ledStripGlow 2s ease-in-out infinite;
}
@keyframes ledStripGlow { 0%,100% { opacity: 0.55; box-shadow: 0 0 10px rgba(255,23,68,0.35),0 0 22px rgba(255,145,0,0.22); } 50% { opacity: 1; box-shadow: 0 0 22px rgba(255,23,68,0.65),0 0 45px rgba(255,145,0,0.45); } }

.nav { display: flex; justify-content: space-between; align-items: center; padding: 1rem 2rem; max-width: 1400px; margin: 0 auto; position: relative; }

.logo { font-family: 'Orbitron',sans-serif; font-size: 1.6rem; font-weight: 900; letter-spacing: 2px; background: linear-gradient(135deg,#ff1744,#ff9100,#ffd700); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; filter: drop-shadow(0 0 15px rgba(255,23,68,0.6)); text-transform: uppercase; animation: neonFlicker 5s infinite 1s; }
.logo::after { content: ''; display: block; width: 100%; height: 2px; background: linear-gradient(90deg,#ff1744,transparent); animation: logoLine 2s ease-in-out infinite; }
@keyframes logoLine { 0%,100% { opacity: 0.3; width: 30%; } 50% { opacity: 1; width: 100%; } }
@keyframes neonFlicker { 0%,19%,21%,23%,25%,54%,56%,100% { opacity:1; filter:drop-shadow(0 0 20px rgba(255,23,68,0.3)); } 20%,24%,55% { opacity:0.85; filter:drop-shadow(0 0 5px rgba(255,23,68,0.1)); } 22% { opacity:0.4; filter:drop-shadow(0 0 2px rgba(255,23,68,0.05)); } }

.nav-links { display: flex; list-style: none; gap: 0.5rem; margin: 0; padding: 0; }
.nav-links a { color: rgba(255,255,255,0.8); text-decoration: none; font-family: 'Orbitron',sans-serif; font-size: 0.8rem; font-weight: 600; letter-spacing: 1px; padding: 0.6rem 1.2rem; border-radius: 8px; transition: all 0.3s ease; position: relative; display: inline-block; text-transform: uppercase; border: 1px solid transparent; }
.nav-links a:hover { color:#fff; border-color:rgba(255,23,68,0.4); box-shadow:0 0 15px rgba(255,23,68,0.2); transform:translateY(-2px); background:linear-gradient(135deg,rgba(255,23,68,0.1),rgba(255,145,0,0.1)); }
.nav-links a::after { content:''; position:absolute; bottom:0; left:50%; width:0; height:2px; background:linear-gradient(90deg,#ff1744,#ff9100); transition:all 0.3s ease; transform:translateX(-50%); box-shadow:0 0 10px rgba(255,23,68,0.4); }
.nav-links a:hover::after { width:80%; }

.glass-card,.card {
  background: linear-gradient(145deg,rgba(255,255,255,0.07) 0%,rgba(255,255,255,0.025) 50%,rgba(255,255,255,0.05) 100%);
  backdrop-filter: blur(28px) saturate(1.25);
  -webkit-backdrop-filter: blur(28px) saturate(1.25);
  border: 1px solid rgba(255,255,255,0.14);
  border-radius: 16px;
  padding: 2rem;
  margin: 1rem 0;
  position: relative;
  overflow: hidden;
  transition: all 0.4s ease;
  box-shadow: 0 10px 40px rgba(0,0,0,0.45),inset 0 1px 0 rgba(255,255,255,0.1),inset 0 -1px 0 rgba(0,0,0,0.35);
  animation: cardEnter 0.7s cubic-bezier(0.22,1,0.36,1) both,ambientBreathe 6s ease-in-out infinite;
}
.glass-card::before,.card::before { content:''; position:absolute; top:0; left:0; right:0; height:1px; background:linear-gradient(90deg,transparent,var(--glass-border),transparent); }
.glass-card::after,.card::after { content:''; position:absolute; top:-60%; left:-60%; width:220%; height:220%; background:linear-gradient(135deg,transparent 42%,rgba(255,255,255,0.035) 47%,rgba(255,255,255,0.07) 50%,rgba(255,255,255,0.035) 53%,transparent 58%); pointer-events:none; animation:glassGlare 7s ease-in-out infinite; }
@keyframes glassGlare { 0%,100% { transform:translateX(-25%) translateY(-25%) rotate(0deg); } 50% { transform:translateX(5%) translateY(5%) rotate(0deg); } }
.glass-card:hover,.card:hover { transform:translateY(-5px); border-color:rgba(255,23,68,0.4); box-shadow:0 25px 55px rgba(0,0,0,0.55),0 0 45px rgba(255,23,68,0.15),inset 0 1px 0 rgba(255,255,255,0.14),inset 0 -1px 0 rgba(0,0,0,0.35); }
@keyframes cardEnter { from { opacity:0; transform:translateY(30px) scale(0.97); } to { opacity:1; transform:translateY(0) scale(1); } }
@keyframes ambientBreathe { 0%,100% { box-shadow:0 10px 40px rgba(0,0,0,0.45),inset 0 1px 0 rgba(255,255,255,0.1),inset 0 -1px 0 rgba(0,0,0,0.35); } 50% { box-shadow:0 15px 50px rgba(0,0,0,0.5),0 0 25px rgba(255,23,68,0.08),inset 0 1px 0 rgba(255,255,255,0.12),inset 0 -1px 0 rgba(0,0,0,0.35); } }
.container .glass-card:nth-child(1) { animation-delay: 0.05s; }
.container .glass-card:nth-child(2) { animation-delay: 0.12s; }

.glass-card,.card { transform-style: preserve-3d; perspective: 1000px; }
.glass-card:hover,.card:hover { transform: translateY(-5px) rotateX(2deg) rotateY(-2deg); }

.page-title {
  font-family: 'Orbitron',sans-serif;
  text-align: center;
  margin: 2rem 0 3rem;
  font-size: 2.5rem;
  font-weight: 900;
  letter-spacing: 3px;
  text-transform: uppercase;
  background: linear-gradient(135deg,#ff1744,#ff9100);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  filter: drop-shadow(0 0 20px rgba(255,23,68,0.3));
  position: relative;
  animation: neonFlicker 4s infinite;
  text-shadow: -2px 0 0 rgba(255,23,68,0.4),2px 0 0 rgba(0,255,255,0.3);
}
.page-title::after { content:''; position:absolute; bottom:-10px; left:50%; transform:translateX(-50%); width:100px; height:3px; background:linear-gradient(90deg,transparent,#ff1744,#ff9100,transparent); border-radius:2px; }

.btn {
  background: linear-gradient(135deg,#ff1744,#ff9100) !important;
  color: white;
  border: none;
  padding: 1rem 2.5rem;
  border-radius: 10px;
  font-family: 'Orbitron',sans-serif;
  font-size: 0.85rem;
  font-weight: 700;
  letter-spacing: 2px;
  cursor: pointer;
  transition: all 0.3s ease;
  text-transform: uppercase;
  box-shadow: 0 5px 22px rgba(255,23,68,0.4),0 0 18px rgba(255,23,68,0.25),inset 0 1px 0 rgba(255,255,255,0.22);
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  text-decoration: none;
  position: relative;
  overflow: hidden;
  background-size: 200% 200% !important;
  animation: gradientShift 3s ease infinite !important;
}
.btn::before { content:''; position:absolute; top:0; left:-100%; width:100%; height:100%; background:linear-gradient(90deg,transparent,rgba(255,255,255,0.25),transparent); transition:left 0.55s ease; }
.btn:hover::before { left: 100%; }
.btn:hover { transform:translateY(-2px); box-shadow:0 10px 35px rgba(255,23,68,0.55),0 0 45px rgba(255,23,68,0.3),inset 0 1px 0 rgba(255,255,255,0.28) !important; }
.btn:active { transform:translateY(0) scale(0.98); }
@keyframes gradientShift { 0% { background-position:0% 50%; } 50% { background-position:100% 50%; } 100% { background-position:0% 50%; } }

.form-group { margin-bottom: 1.5rem; }
.label { display:block; margin-bottom:0.5rem; font-weight:600; color:#ff9100; font-family:'Orbitron',sans-serif; font-size:0.75rem; letter-spacing:1px; text-transform:uppercase; }
.input {
  width: 100%;
  padding: 1rem 1.2rem;
  border: 1px solid rgba(255,23,68,0.18);
  border-radius: 10px;
  background: linear-gradient(145deg,rgba(0,0,0,0.4) 0%,rgba(0,0,0,0.28) 100%);
  color: #fff;
  font-size: 1rem;
  font-family: 'Rajdhani',sans-serif;
  transition: all 0.3s ease;
  box-shadow: inset 0 2px 5px rgba(0,0,0,0.35),0 1px 0 rgba(255,255,255,0.04);
}
.input:focus { outline:none; border-color:rgba(255,23,68,0.55); background:linear-gradient(145deg,rgba(0,0,0,0.5) 0%,rgba(0,0,0,0.38) 100%); box-shadow:0 0 0 3px rgba(255,23,68,0.1),0 0 28px rgba(255,23,68,0.18),inset 0 2px 5px rgba(0,0,0,0.45); }
.input::placeholder { color: rgba(255,255,255,0.3); }

/* select#corredor_id - texto preto */
select#corredor_id { color:#000 !important; }
select#corredor_id option { color:#000 !important; background:#fff; }
select#corredor_id option[value=""] { color:rgba(0,0,0,0.5) !important; }

.table-wrapper { overflow-x:auto; border-radius:12px; border:1px solid rgba(255,255,255,0.08); background:linear-gradient(145deg,rgba(255,255,255,0.04) 0%,rgba(255,255,255,0.015) 100%); backdrop-filter:blur(18px); -webkit-backdrop-filter:blur(18px); box-shadow:0 10px 35px rgba(0,0,0,0.35),inset 0 1px 0 rgba(255,255,255,0.06); }
.table { width:100%; border-collapse:separate; border-spacing:0; background:transparent; min-width:500px; }
.table th { background:linear-gradient(135deg,rgba(255,23,68,0.22) 0%,rgba(255,145,0,0.16) 100%); padding:1.2rem 1.5rem; text-align:left; font-family:'Orbitron',sans-serif; font-weight:700; font-size:0.75rem; text-transform:uppercase; letter-spacing:2px; color:#ff9100; border-bottom:1px solid rgba(255,23,68,0.35); white-space:nowrap; }
.table td { padding:1.2rem 1.5rem; border-bottom:1px solid rgba(255,255,255,0.03); color:rgba(255,255,255,0.85); }
.table tbody tr { transition:all 0.3s ease; }
.table tbody tr:hover { background:linear-gradient(90deg,rgba(255,23,68,0.05) 0%,rgba(255,145,0,0.08) 50%,rgba(255,23,68,0.05) 100%) !important; transform:scaleX(1.01); box-shadow:0 0 20px rgba(255,23,68,0.1); }

.text-center { text-align: center; }
.w-full { width: 100%; }
.mt-1 { margin-top: 1rem; }
.mt-2 { margin-top: 2rem; }
.mb-1 { margin-bottom: 1rem; }
.mb-2 { margin-bottom: 2rem; }

.loading { display: inline-block; width: 20px; height: 20px; border: 2px solid rgba(255,23,68,0.2); border-radius: 50%; border-top-color: #ff1744; border-right-color: #ff9100; border-bottom-color: transparent; border-left-color: transparent; animation: spin 0.8s linear infinite; box-shadow: 0 0 10px rgba(255,23,68,0.2); }
@keyframes spin { to { transform: rotate(360deg); } }

::-webkit-scrollbar { width: 10px; }
::-webkit-scrollbar-track { background: rgba(0,0,0,0.3); }
::-webkit-scrollbar-thumb { background: linear-gradient(180deg,#ff1744,#ff9100); border-radius: 5px; }

[title] { position: relative; }
[title]:hover::after { content: attr(title); position:absolute; bottom:calc(100% + 8px); left:50%; transform:translateX(-50%); background:linear-gradient(135deg,rgba(255,23,68,0.9),rgba(255,145,0,0.9)); color:#fff; padding:0.5rem 1rem; border-radius:8px; font-family:'Orbitron',sans-serif; font-size:0.7rem; letter-spacing:1px; text-transform:uppercase; white-space:nowrap; z-index:10000; box-shadow:0 4px 15px rgba(255,23,68,0.3); pointer-events:none; animation:tooltipPop 0.2s ease both; }
[title]:hover::before { content:''; position:absolute; bottom:calc(100% + 3px); left:50%; transform:translateX(-50%); border:5px solid transparent; border-top-color:rgba(255,145,0,0.9); z-index:10001; pointer-events:none; }
@keyframes tooltipPop { from { opacity:0; transform:translateX(-50%) translateY(5px) scale(0.9); } to { opacity:1; transform:translateX(-50%) translateY(0) scale(1); } }

.f1-badge { display:inline-flex; align-items:center; justify-content:center; min-width:32px; height:32px; background:linear-gradient(135deg,#ff1744,#ff9100); border-radius:6px; font-family:'Orbitron',sans-serif; font-weight:700; font-size:0.8rem; color:#fff; box-shadow:0 0 10px rgba(255,23,68,0.3); animation:badgePulse 2s ease-in-out infinite; }
@keyframes badgePulse { 0%,100% { box-shadow:0 0 10px rgba(255,23,68,0.3); } 50% { box-shadow:0 0 20px rgba(255,23,68,0.5),0 0 30px rgba(255,145,0,0.3); } }

@media (max-width: 575.98px) {
  .container { padding: 1rem; }
  .glass-card,.card { padding:1.5rem; margin:0.75rem 0; backdrop-filter:blur(18px) saturate(1.1); -webkit-backdrop-filter:blur(18px) saturate(1.1); }
  .btn { width:100%; min-height:48px; font-size:0.8rem; }
  .page-title { font-size:1.8rem; }
  .nav-links { position:fixed; top:0; right:0; bottom:0; width:280px; height:100vh; background:rgba(5,5,10,0.98); backdrop-filter:blur(30px); flex-direction:column; gap:0; padding-top:5rem; transform:translateX(100%); transition:transform 0.4s ease; z-index:1002; border-left:1px solid rgba(255,23,68,0.2); }
  .nav-links.active { transform:translateX(0); }
  html::before,html::after,body::after { opacity:0.45; }
  .glass-card::after,.card::after { animation:none; }
  [title]:hover::after,[title]:hover::before { display:none; }
}
@media (prefers-reduced-motion: reduce) {
  *,*::before,*::after { animation-duration:0.01ms !important; animation-iteration-count:1 !important; transition-duration:0.01ms !important; }
  html { scroll-behavior: auto; }
}
  </style>
</head>
<body>
  <header class="header">
    <nav class="nav">
      <div class="logo">🏎️ F1 SYSTEM</div>
      <ul class="nav-links">
        <li><a href="dashboard.html">📊 Dashboard</a></li>
        <li><a href="cadastro-usuarios.html">👤 Usuários</a></li>
        <li><a href="cadastro-corredores.html">🏁 Corredores</a></li>

      <form class="form-section">
        <div class="form-group">
          <label class="label">Corredor</label>

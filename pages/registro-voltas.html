<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro Voltas - F1 System</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
  <header class="header">
    <nav class="nav">
      <div class="logo">🏎️ F1 SYSTEM</div>
      <ul class="nav-links">
        <li><a href="dashboard.html">📊 Dashboard</a></li>
        <li><a href="cadastro-usuarios.html">👤 Usuários</a></li>
        <li><a href="cadastro-corredores.html">🏁 Corredores</a></li>
        <li><a href="registro-voltas.html">⏱️ Voltas</a></li>
        <li><a href="ranking.html">🏆 Ranking</a></li>
        <li><a href="podio.html">🥇 Pódio</a></li>
        <li><a href="#" onclick="logout()">🚪 Sair</a></li>
      </ul>
    </nav>
  </header>

  <div class="container">
    <div class="card" style="max-width: 700px; margin: 3rem auto;">
      <h1 style="text-align: center; background: linear-gradient(45deg, #ff1744, #ff9100); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">
        ⏱️ Registro de Voltas
      </h1>
      
      <form id="voltaForm">
        <div class="form-group">
          <label class="label">Corredor</label>
          <select id="corredor_id" class="input" required>
            <option value="">Selecionar...</option>
          </select>
        </div>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
          <div class="form-group">
            <label class="label">Nº da Volta</label>
            <input type="number" id="numero_volta" class="input" required>
          </div>
          
          <div class="form-group">
            <label class="label">Tempo (minutos.decimal)</label>
            <input type="number" step="0.001" id="tempo_volta" class="input" placeholder="1.234" required>
          </div>
        </div>
        
        <button type="submit" class="btn" style="width: 100%;">Registrar Volta 🏁</button>
      </form>
      
      <div id="voltaMessage" style="margin-top: 1rem; text-align: center;"></div>
    </div>

    <div class="card">
      <h2 style="color: #ff9100; margin-bottom: 1.5rem;">Últimas Voltas</h2>
      <div id="ultimasVoltas">Carregando...</div>
    </div>
  </div>

  <script type="module" src="../js/voltas.js"></script>
</body>
</html>

<script>function logout(){localStorage.removeItem('f1_user');window.location.href='login.html'}</script>

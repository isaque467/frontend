<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Usuários - F1 System</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <header class="header">
    <nav class="nav">
      <div class="logo">🏎️ F1 SYSTEM</div>
      <ul class="nav-links">
        <li><a href="dashboard.html">📊 Dashboard</a></li>
        <li><a href="cadastro-usuarios.html">👤 Usuários</a></li>
        <li><a href="cadastro-corredores.html">🏁 Corredores</a></li>
        <li><a href="registro-voltas.html">⏱️ Voltas</a></li>
        <li><a href="ranking.html">🏆 Ranking</a></li>
        <li><a href="podio.html">🥇 Pódio</a></li>
        <li><a href="#" onclick="logout()">🚪 Sair</a></li>
      </ul>
    </nav>
  </header>

  <div class="container">
    <h1 class="page-title">👤 Gerenciar Usuários</h1>
    <div class="glass-card">
      <form class="form-section">
        <div class="form-group">
          <label class="label">Nome</label>
          <input type="text" class="input" placeholder="Nome completo">
        </div>
        <div class="form-group">
          <label class="label">Email</label>
          <input type="email" class="input" placeholder="email@exemplo.com">
        </div>
        <div class="form-group">
          <label class="label">Cargo</label>
          <select class="input">
            <option>Administrador</option>
            <option>Equipe</option>
            <option>Corredor</option>
          </select>
        </div>
        <button type="submit" class="btn">Adicionar Usuário 🚀</button>
      </form>

      <div class="table-wrapper mt-2">
        <table class="table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Nome</th>
              <th>Email</th>
              <th>Cargo</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>#001</td>
              <td>Demo User</td>
              <td>demo@f1.com</td>
              <td>Admin</td>
              <td><button class="btn" style="padding: 0.5rem 1rem; font-size: 0.75rem;">Editar</button></td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>function logout(){localStorage.removeItem('f1_user');window.location.href='login.html'}</script>
</body>
</html>

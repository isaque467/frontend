<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro Usuários - F1 System</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="menu-overlay" id="menuOverlay" onclick="closeMenu()"></div>

  <header class="header">
    <nav class="nav">
      <div class="logo">🏎️ F1 SYSTEM</div>
      <button class="hamburger" id="hamburgerBtn" aria-label="Menu" aria-expanded="false" onclick="toggleMenu()">☰</button>
      <ul class="nav-links" id="navLinks">
        <li><a href="cadastro-corredores.html" onclick="closeMenu()">🏁 Corredores</a></li>
      </ul>
    </nav>
  </header>

  <div class="container">
    <div class="glass-card" style="max-width: 600px; margin: 3rem auto;">
      <h1 class="page-title" style="font-size: 1.8rem; margin-bottom: 2rem;">👤 Cadastro de Usuários</h1>
      
      <form id="userForm">
        <div class="form-group">
          <label class="label">Nome Completo</label>
          <input type="text" id="nome" class="input" placeholder="Digite o nome completo" required>
        </div>
        
        <div class="form-group">
          <label class="label">Email</label>
          <input type="email" id="email" class="input" placeholder="exemplo@email.com" required>
        </div>
        
        <div class="form-group">
          <label class="label">Senha</label>
          <input type="password" id="senha" class="input" placeholder="Mínimo 6 caracteres" required>
        </div>
        
        <button type="submit" class="btn w-full">Criar Usuário 🆕</button>
      </form>
      
      <div id="userMessage" class="mt-1 text-center"></div>
  </div>

  <script type="module" src="../js/usuarios.js"></script>
  <script>
    function logout() {
      localStorage.removeItem('f1_user');
      window.location.href = 'login.html';
    }

    function toggleMenu() {
      const nav = document.getElementById('navLinks');
      const overlay = document.getElementById('menuOverlay');
      const btn = document.getElementById('hamburgerBtn');
      const isOpen = nav.classList.toggle('active');
      overlay.classList.toggle('active', isOpen);
      btn.setAttribute('aria-expanded', isOpen);
      btn.textContent = isOpen ? '✕' : '☰';
      document.body.style.overflow = isOpen ? 'hidden' : '';
    }

    function closeMenu() {
      const nav = document.getElementById('navLinks');
      const overlay = document.getElementById('menuOverlay');
      const btn = document.getElementById('hamburgerBtn');
      nav.classList.remove('active');
      overlay.classList.remove('active');
      btn.setAttribute('aria-expanded', 'false');
      btn.textContent = '☰';
      document.body.style.overflow = '';
    }

    window.addEventListener('resize', () => {
      if (window.innerWidth > 575.98) closeMenu();
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout F1 System 💳</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <header class="header">
    <nav class="nav">
      <div class="logo">🏎️ F1 SYSTEM</div>
      <ul class="nav-links">
        <li><a href="dashboard.html">📊 Dashboard</a></li>
        <li><a href="loja.html">🛒 Loja</a></li>
        <li><a href="podio.html">🥇 Pódio</a></li>
        <li><a href="#" onclick="logout()">🚪 Sair</a></li>
      </ul>
    </nav>
  </header>

  <div class="container">
    <h1 class="page-title">Checkout 🏁</h1>
    
    <div class="glass-card">
      <h2>Resumo do Pedido</h2>
      <div id="resumo-pedido">
        <!-- Carrinho renderizado aqui -->
      </div>
      <div class="stats-grid" style="margin-top: 1rem;">
        <div class="card stat-card">
          <div class="stat-number" id="final-total">R$ 0,00</div>
          <div>Total Final</div>
        </div>
      </div>
    </div>

    <div class="form-group">
      <label class="label">Dados do Pagamento</label>
      <input class="input" placeholder="Número do cartão" maxlength="19">
      <input class="input" placeholder="Nome no cartão">
      <div class="stats-grid">
        <input class="input" placeholder="Validade MM/AA" style="grid-column: span 1;">
        <input class="input" placeholder="CVV" style="grid-column: span 1;">
      </div>
    </div>

    <button class="btn" onclick="confirmarPedido()" style="width: 100%; font-size: 1.2rem; padding: 1.5rem;">Pagar Agora 💳</button>
  </div>

  <script type="module" src="../js/checkout.js"></script>
  <script type="module" src="../js/theme-toggle.js"></script>
</body>
</html>

<script>function logout(){localStorage.removeItem('f1_user');window.location.href='login.html'}</script>

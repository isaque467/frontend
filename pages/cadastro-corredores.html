<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro Corredores - F1 System</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="menu-overlay" id="menuOverlay" onclick="closeMenu()"></div>

  <header class="header">
    <nav class="nav">
      <div class="logo">🏎️ F1 SYSTEM</div>
      <button class="hamburger" id="hamburgerBtn" aria-label="Menu" aria-expanded="false" onclick="toggleMenu()">☰</button>
      <ul class="nav-links" id="navLinks">
        <li><a href="dashboard.html" onclick="closeMenu()">📊 Dashboard</a></li>
        <li><a href="cadastro-usuarios.html" onclick="closeMenu()">👤 Usuários</a></li>
        <li><a href="cadastro-corredores.html" onclick="closeMenu()">🏁 Corredores</a></li>
        <li><a href="registro-voltas.html" onclick="closeMenu()">⏱️ Voltas</a></li>
        <li><a href="ranking.html" onclick="closeMenu()">🏆 Ranking</a></li>
        <li><a href="podio.html" onclick="closeMenu()">🥇 Pódio</a></li>
        <li><a href="#" onclick="logout(); closeMenu();">🚪 Sair</a></li>
      </ul>
    </nav>
  </header>

  <div class="container">
    <!-- Formulário -->
    <div class="glass-card" style="max-width: 600px; margin: 3rem auto;">
      <h1 class="page-title" style="font-size: 1.8rem; margin-bottom: 2rem;">🏁 Cadastro de Corredores</h1>
      
      <form id="corredorForm">
        <div class="form-group">
          <label class="label">Nome do Corredor</label>
          <input type="text" id="nome" class="input" placeholder="Ex: Lewis Hamilton" required>
        </div>
        
        <div class="form-group">
          <label class="label">Número</label>
          <input type="number" id="numero" class="input" placeholder="44" required>
        </div>
        
        <div class="form-group">
          <label class="label">Equipe</label>
          <input type="text" id="equipe" class="input" placeholder="Mercedes-AMG" required>
        </div>
        
        <button type="submit" class="btn w-full">Cadastrar Corredor 🏎️</button>
      </form>
      
      <div id="corredorMessage" class="mt-1 text-center"></div>
    </div>

    <!-- Lista de Corredores -->
    <div class="glass-card mt-3" style="max-width: 1400px; margin: 3rem auto;">
      <h2 class="section-title">Lista de Corredores</h2>
      <div id="listaCorredores">
        <p class="text-center" style="opacity: 0.7;">Carregando...</p>
      </div>
    </div>

  <script type="module" src="../js/corredores.js"></script>
  <script>
    function logout() {
      localStorage.removeItem('f1_user');
      window.location.href = 'login.html';
    }

    function toggleMenu() {
      const nav = document.getElementById('navLinks');
      const overlay = document.getElementById('menuOverlay');
      const btn = document.getElementById('hamburgerBtn');
      const isOpen = nav.classList.toggle('active');
      overlay.classList.toggle('active', isOpen);
      btn.setAttribute('aria-expanded', isOpen);
      btn.textContent = isOpen ? '✕' : '☰';
      document.body.style.overflow = isOpen ? 'hidden' : '';
    }

    function closeMenu() {
      const nav = document.getElementById('navLinks');
      const overlay = document.getElementById('menuOverlay');
      const btn = document.getElementById('hamburgerBtn');
      nav.classList.remove('active');
      overlay.classList.remove('active');
      btn.setAttribute('aria-expanded', 'false');
      btn.textContent = '☰';
      document.body.style.overflow = '';
    }

    window.addEventListener('resize', () => {
      if (window.innerWidth > 575.98) closeMenu();
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro Corredores - F1 System</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
  <header class="header">
  <nav class="nav">
    <div class="logo">🏎️ F1 SYSTEM</div>
    <button class="hamburger" aria-label="Toggle Menu" onclick="toggleMenu()">☰</button>
    <ul class="nav-links">
      <li><a href="dashboard.html">📊 Dashboard</a></li>
      <li><a href="cadastro-usuarios.html">👤 Usuários</a></li>
      <li><a href="cadastro-corredores.html">🏁 Corredores</a></li>
      <li><a href="registro-voltas.html">⏱️ Voltas</a></li>
      <li><a href="ranking.html">🏆 Ranking</a></li>
      <li><a href="podio.html">🥇 Pódio</a></li>
      <li><a href="#" onclick="logout()">🚪 Sair</a></li>
    </ul>
  </nav>
  </header>

  <div class="container">
    <div class="card" style="max-width: 600px; margin: 3rem auto;">
      <h1 style="text-align: center; background: linear-gradient(45deg, #ff1744, #ff9100); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">
        🏁 Cadastro de Corredores
      </h1>
      
      <form id="corredorForm">
        <div class="form-group">
          <label class="label">Nome do Corredor</label>
          <input type="text" id="nome" class="input" placeholder="Ex: Lewis Hamilton" required>
        </div>
        
        <div class="form-group">
          <label class="label">Número</label>
          <input type="number" id="numero" class="input" placeholder="44" required>
        </div>
        
        <div class="form-group">
          <label class="label">Equipe</label>
          <input type="text" id="equipe" class="input" placeholder="Mercedes-AMG" required>
        </div>
        
        <button type="submit" class="btn" style="width: 100%;">Cadastrar Corredor 🏎️</button>
      </form>
      
      <div id="corredorMessage" style="margin-top: 1rem; text-align: center;"></div>
    </div>

    <div class="card" style="margin-top: 3rem;">
      <h2 style="margin-bottom: 1.5rem; color: #ff9100;">Lista de Corredores</h2>
      <div id="listaCorredores">
        <p>Carregando...</p>
      </div>
    </div>
  </div>

  <script type="module" src="../js/corredores.js"></script>
</body>
</html>

<script>function logout(){localStorage.removeItem('f1_user');window.location.href='login.html'}
function toggleMenu(){document.querySelector('.nav-links').classList.toggle('active');}</script>

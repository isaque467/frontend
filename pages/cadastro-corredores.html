<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Corredores - F1 System</title>
  <link rel="stylesheet" href="style.css">
  <link
    href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&display=swap"
    rel="stylesheet">
</head>

<body>
  <header class="header">
    <nav class="nav">
      <div class="logo">🏎️ F1 SYSTEM</div>
      <ul class="nav-links">
        <li><a href="dashboard.html">📊 Dashboard</a></li>
        <li><a href="cadastro-usuarios.html">👤 Usuários</a></li>
        <li><a href="cadastro-corredores.html">🏁 Corredores</a></li>
        <li><a href="registro-voltas.html">⏱️ Voltas</a></li>
        <li><a href="ranking.html">🏆 Ranking</a></li>
        <li><a href="podio.html">🥇 Pódio</a></li>
        <li><a href="#" onclick="logout()">🚪 Sair</a></li>
      </ul>
    </nav>
  </header>

  <div class="container">
    <h1 class="page-title">🏁 Cadastro Corredores</h1>
    <div class="glass-card">
      <form class="form-section">
        <div class="form-group">
          <label class="label">Nome Piloto</label>
          <input type="text" class="input" placeholder="Nome do corredor">
        </div><div class="form-group">
          <label class="label">Número</label>
          <input type="number" class="input" placeholder="#7">
        </div>
        
        <div class="form-group">
          <label class="label">Equipe</label>
          <input type="text" class="input" placeholder="Equipe/Turma">
        </div>
        <button type="submit" class="btn">Cadastrar Corredor 🏎️</button>
      </form>

      <div class="table-wrapper mt-2">
        <table class="table">
          <thead>
            <tr>
              <th>#</th>
              <th>Piloto</th>
              <th>Equipe</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>function logout() { localStorage.removeItem('f1_user'); window.location.href = 'login.html' }</script>
</body>

</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - F1 System</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <div class="glass-card login-card">
      <h1 class="page-title">🏎️ Login F1 System</h1>
      <form class="login-form">
        <div class="form-group">
          <label class="label">Usuário</label>
          <input type="text" class="input" placeholder="Seu usuário" required>
        </div>
        <div class="form-group">
          <label class="label">Senha</label>
          <input type="password" class="input" placeholder="Senha" required>
        </div>
        <button type="submit" class="btn w-full">Entrar no Pit Stop 🚀</button>
      </form>
    </div>
  </div>

  <script>
    document.querySelector('.login-form').onsubmit = (e) => {
      e.preventDefault();
      localStorage.setItem('f1_user', 'demo-user');
      window.location.href = 'dashboard.html';
    };
  </script>
</body>
</html>

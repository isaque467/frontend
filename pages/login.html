<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Sistema Corrida F1</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
  <header class="header">
    <nav class="nav">
      <div class="logo">🏎️ F1 SYSTEM</div>
    </nav>
  </header>

  <div class="container">
    <div class="card" style="max-width: 500px; margin: 5rem auto 0;">
      <h1 style="text-align: center; margin-bottom: 2rem; font-size: 2.5rem; background: linear-gradient(45deg, #ff1744, #ff9100); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">
        Login
      </h1>
      
      <form id="loginForm">
        <div class="form-group">
          <label class="label">Email</label>
          <input type="email" id="email" class="input" placeholder="admin@f1.com" required>
        </div>
        
        <div class="form-group">
          <label class="label">Senha</label>
          <input type="password" id="senha" class="input" placeholder="password" required>
        </div>
        
        <button type="submit" class="btn" style="width: 100%;">Entrar no Sistema 🏁</button>
      </form>
      
      <div id="loginMessage" style="margin-top: 1rem; text-align: center;"></div>
      
      <p style="text-align: center; margin-top: 2rem; opacity: 0.7;">
        Não tem conta? <a href="cadastro-usuarios.html" style="color: #ff9100;">Cadastre-se</a>
      </p>
    </div>
  </div>

  <script type="module" src="../js/api.js"></script>
  <script type="module" src="../js/login.js"></script>
</body>
</html>

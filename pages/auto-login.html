<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Auto Login - F1 System</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #050508;
      color: #e0e0e0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }
    .loading {
      width: 50px;
      height: 50px;
      border: 3px solid rgba(255,23,68,0.2);
      border-radius: 50%;
      border-top-color: #ff1744;
      animation: spin 1s linear infinite;
      margin-bottom: 2rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    h1 { color: #ff9100; margin-bottom: 1rem; }
    .error { color: #ff1744; }
    .success { color: #4ade80; }
  </style>
</head>
<body>
  <div class="loading"></div>
  <h1>🏎️ F1 System</h1>
  <p id="status">Fazendo login automático...</p>

  <script type="module">
    import { apiRequest } from '../js/api.js';

    const status = document.getElementById('status');

    async function autoLogin() {
      try {
        // Tentar fazer login com credenciais de teste
        const data = await apiRequest('/login', {
          method: 'POST',
          body: JSON.stringify({
            email: 'teste@teste.com',
            senha: '123456'
          })
        });

        status.textContent = '✅ Login realizado! Redirecionando...';
        status.className = 'success';

        // Salvar usuário no localStorage
        localStorage.setItem('f1_user', JSON.stringify(data.user));

        // Redirecionar para dashboard
        setTimeout(() => {
          window.location.href = 'dashboard.html';
        }, 1000);

      } catch (error) {
        status.textContent = '❌ Erro no login: ' + error.message;
        status.className = 'error';
        console.error('Erro:', error);
      }
    }

    autoLogin();
  </script>
</body>
</html>

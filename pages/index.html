<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema Corrida F1 - Início</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
</head>

<body>
  <header class="header">
    <nav class="nav">
      <div class="logo" style="font-size: 2.5rem;">🏎️ F1 SYSTEM</div>
    </nav>
  </header>

  <div class="container" style="text-align: center; margin-top: 5rem;">
    <h1
      style="font-size: 4rem; margin-bottom: 2rem; background: linear-gradient(45deg, #ff1744, #ff9100, #ffd700); -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: glow 2s ease-in-out infinite alternate;">
      Bem-vindo ao Sistema F1
    </h1>

    <div class="card" style="max-width: 800px; margin: 0 auto 3rem;">
      <h2 style="margin-bottom: 2rem; color: #ff9100;">🚀 Sistema Completo Funcional</h2>
      <p style="font-size: 1.3rem; opacity: 0.9; line-height: 1.6;">
        Login → Cadastro → Voltas → Ranking → Pódio<br>
      </p>
    </div>

    <div
      style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 2rem; max-width: 1200px; margin: 0 auto;">
      <a href="./login.html" class="btn" style="font-size: 1.3rem;">🔐 Login</a>
    </div>

    <style>
      @keyframes glow {
        from {
          filter: drop-shadow(0 0 20px #ff1744);
        }

        to {
          filter: drop-shadow(0 0 30px #ff9100);
        }
      }
    </style>
</body>

</html>

e r u<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="../manifest.json">
  <meta name="theme-color" content="#ff1744">
  <title>Dashboard - Sistema Corrida F1</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="menu-overlay" id="menuOverlay" onclick="closeMenu()"></div>

  <header class="header">
    <nav class="nav">
      <div class="logo">🏎️ F1 SYSTEM</div>
      <button class="hamburger" id="hamburgerBtn" aria-label="Menu" aria-expanded="false" onclick="toggleMenu()">☰</button>
      <ul class="nav-links" id="navLinks">
        <li><a href="dashboard.html" onclick="closeMenu()">📊 Dashboard</a></li>
        <li><a href="cadastro-usuarios.html" onclick="closeMenu()">👤 Usuários</a></li>
        <li><a href="cadastro-corredores.html" onclick="closeMenu()">🏁 Corredores</a></li>
        <li><a href="registro-voltas.html" onclick="closeMenu()">⏱️ Voltas</a></li>
        <li><a href="ranking.html" onclick="closeMenu()">🏆 Ranking</a></li>
        <li><a href="podio.html" onclick="closeMenu()">🥇 Pódio</a></li>
        <li><a href="#" onclick="logout(); closeMenu();">🚪 Sair</a></li>
      </ul>
    </nav>
  </header>

  <div class="container">
    <h1 class="page-title">Painel de Controle F1 🏎️</h1>

    <section class="charts-section">
      <h2 class="section-title" style="text-align: center; margin-bottom: 2rem; color: #ff9100;">📈 Gráficos em Tempo Real</h2>
      <div class="charts-grid">
        <canvas id="leadersChart" class="chart-canvas"></canvas>
        <canvas id="voltasChart" class="chart-canvas"></canvas>
      </div>
    </section>

    <div class="stats-grid" id="stats">
      <!-- Stats via JS aprimorados -->
    </div>

    <div class="enhanced-podium" id="podioDashboard">
      <!-- Pódio aprimorado via JS -->
    </div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link rel="stylesheet" href="podium.css">

  <script type="module" src="../js/api.js"></script>
  <script type="module" src="../js/dashboard.js"></script>
<script type="module" src="../js/theme-toggle.js"></script>
<script type="module" src="../js/particles.js"></script>

  <script>
    function logout() {
      localStorage.removeItem('f1_user');
      window.location.href = 'login.html';
    }

    function toggleMenu() {
      const nav = document.getElementById('navLinks');
      const overlay = document.getElementById('menuOverlay');
      const btn = document.getElementById('hamburgerBtn');
      const isOpen = nav.classList.toggle('active');
      overlay.classList.toggle('active', isOpen);
      btn.setAttribute('aria-expanded', isOpen);
      btn.textContent = isOpen ? '✕' : '☰';
      document.body.style.overflow = isOpen ? 'hidden' : '';
    }

    function closeMenu() {
      const nav = document.getElementById('navLinks');
      const overlay = document.getElementById('menuOverlay');
      const btn = document.getElementById('hamburgerBtn');
      nav.classList.remove('active');
      overlay.classList.remove('active');
      btn.setAttribute('aria-expanded', 'false');
      btn.textContent = '☰';
      document.body.style.overflow = '';
    }

    window.addEventListener('resize', () => {
      if (window.innerWidth > 575.98) closeMenu();
    });
  </script>

</body>
</html>
